<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanas Developer Console - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e17;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 217, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridScroll 20s linear infinite;
        }

        @keyframes gridScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        .login-card {
            background: #13182b;
            backdrop-filter: blur(20px);
            border: 1px solid #1e2847;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 217, 255, 0.2);
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 48px;
            height: 48px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 32px rgba(0, 217, 255, 0.6), 0 0 64px rgba(0, 255, 136, 0.3);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 32px rgba(0, 217, 255, 0.6), 0 0 64px rgba(0, 255, 136, 0.3); }
            50% { box-shadow: 0 0 48px rgba(0, 217, 255, 0.8), 0 0 96px rgba(0, 255, 136, 0.5); }
        }

        .logo svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        h1 {
            color: #e4e7f0;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .tagline {
            color: #8b95b0;
            font-size: 14px;
            text-align: center;
            margin-bottom: 32px;
            font-family: 'SF Mono', monospace;
        }

        .input-group {
            margin-bottom: 16px;
        }

        input[type="email"] {
            width: 100%;
            padding: 14px 16px;
            background: #0a0e17;
            border: 1px solid #1e2847;
            border-radius: 12px;
            color: #e4e7f0;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
            font-family: 'SF Mono', monospace;
        }

        input[type="email"]::placeholder {
            color: #5a6b8c;
        }

        input[type="email"]:focus {
            border-color: #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
            background: rgba(0, 217, 255, 0.05);
        }

        .continue-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            border: none;
            border-radius: 12px;
            color: #0a0e17;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.6), 0 4px 12px rgba(0, 255, 136, 0.3);
        }

        .continue-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .terms {
            font-size: 12px;
            color: #5a6b8c;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .terms a {
            color: #00d9ff;
            text-decoration: none;
            transition: all 0.2s;
        }

        .terms a:hover {
            color: #00ff88;
            text-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #5a6b8c;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1e2847;
        }

        .divider span {
            padding: 0 16px;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            background: #0a0e17;
            border: 1px solid #1e2847;
            border-radius: 12px;
            color: #e4e7f0;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .google-btn:hover {
            background: rgba(0, 217, 255, 0.05);
            border-color: #00d9ff;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5zm0 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/>
            </svg>
        </div>

        <h1>Welcome to Sanas Developer Console</h1>

        <div class="input-group">
            <input type="email" placeholder="admin.name@sanas.ai" id="emailInput">
        </div>

        <button class="continue-btn" id="continueBtn">Continue</button>

        <p class="terms">
            By signing in, you agree to the Sanas <a href="#">Terms of Use</a>
        </p>

        <div class="divider">
            <span>or</span>
        </div>

        <button class="google-btn" id="googleBtn">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
        </button>
    </div>

    <script>
        const emailInput = document.getElementById('emailInput');
        const continueBtn = document.getElementById('continueBtn');
        const googleBtn = document.getElementById('googleBtn');

        // Enable/disable continue button based on email input
        emailInput.addEventListener('input', function() {
            if (this.value.trim() !== '') {
                continueBtn.style.background = 'linear-gradient(135deg, #8B5CF6 0%, #6366F1 100%)';
                continueBtn.style.color = 'white';
                continueBtn.style.cursor = 'pointer';
            } else {
                continueBtn.style.background = 'rgba(55, 65, 81, 1)';
                continueBtn.style.color = 'rgba(156, 163, 175, 1)';
            }
        });

        // Email passcode flow
        continueBtn.addEventListener('click', function() {
            const email = emailInput.value.trim();
            if (email) {
                // Redirect to accounts page
                window.location.href = 'accounts.html';
            }
        });

        // Google sign-in flow
        googleBtn.addEventListener('click', function() {
            // Redirect to accounts page
            window.location.href = 'accounts.html';
        });

        // Enter key support
        emailInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                continueBtn.click();
            }
        });
    </script>
</body>
</html>
